<script>
/* ══════════════════════════════════════════════════════════
   TEST FRAMEWORK
══════════════════════════════════════════════════════════ */
let results=[];let startTime;

function assert(cond,msg){if(!cond)throw new Error(msg||'assertion failed');}
function assertEqual(a,b,msg){if(a!==b)throw new Error((msg||'not equal')+`: got ${JSON.stringify(a)}, expected ${JSON.stringify(b)}`);}
function assertContains(arr,item,msg){if(!arr.includes(item))throw new Error((msg||'not found')+`: ${JSON.stringify(item)} in ${JSON.stringify(arr)}`);}
function assertGT(a,b,msg){if(!(a>b))throw new Error((msg||'')+`: ${a} > ${b} failed`);}
function assertGTE(a,b,msg){if(!(a>=b))throw new Error((msg||'')+`: ${a} >= ${b} failed`);}

/* ══════════════════════════════════════════════════════════
   MOCK: simulate pp5 DB and functions
══════════════════════════════════════════════════════════ */
function makeMockDB(){
  const PALS=[
    {bg:'#e4f3db',bar:'#1a5c3f',e:'🌱'},{bg:'#daeaf8',bar:'#1a4a7a',e:'📘'},
    {bg:'#fef0dc',bar:'#7a4400',e:'🔢'},{bg:'#fceaea',bar:'#8b2020',e:'🎨'},
  ];
  function makeEmptyTerm(ratio){
    const p=ratio.split('-').map(Number);
    return{ratio,colMax:p[0],finMax:p[1],inds:[],scores:{},fin:{},att:{rec:{},dates:[],notes:[]}};
  }
  const students=[
    {id:'s1',sid:'01414',pid:'0630700075491',name:'เด็กชายสุขชัย ดีมาก',sex:'ช'},
    {id:'s2',sid:'01417',pid:'0630700026805',name:'เด็กชายอาวิพุช สบาย',sex:'ช'},
    {id:'s3',sid:'01434',pid:'1638900110180',name:'เด็กหญิงมาลี ใจดี',sex:'ญ'},
    {id:'s4',sid:'01435',pid:'0630700074711',name:'เด็กหญิงสมใจ รักเรียน',sex:'ญ'},
    {id:'s5',sid:'01436',pid:'8630789000415',name:'เด็กชายวีระ กล้าหาญ',sex:'ช'},
  ];
  const subject={
    id:'subj1',palIdx:0,school:'วชช. น้ำมอเกอร์',year:'2567',cls:'ป.1/1',
    code:'ง1110',sub:'การงานอาชีพ',grp:'การงานอาชีพ',cred:1,
    teach:'นายอนุโรจน์ นิสัยแก้ว',hpw:1,wpterm:20,hpt:20,hpy:40,
    terms:{
      1:{...makeEmptyTerm('70-30'),
        inds:[
          {id:'i1',code:'ง.1.1 ป.1/1',desc:'บอกวิธีการทำงาน',max:30},
          {id:'i2',code:'ง.1.1 ป.1/2',desc:'ใช้วัสดุอุปกรณ์',max:20},
          {id:'i3',code:'ง.1.1 ป.1/3',desc:'ทำงานกระตือรือร้น',max:20},
        ]
      },
      2:{...makeEmptyTerm('70-30'),
        inds:[
          {id:'i4',code:'ง.1.1 ป.1/1',desc:'บอกวิธีการทำงาน',max:35},
          {id:'i5',code:'ง.1.1 ป.1/2',desc:'ใช้วัสดุอุปกรณ์',max:35},
        ]

}

/* ══ helpers matching pp5 logic ══ */
function getCollect(DB,subjId,t,sid){
  const s=DB.subjects.find(x=>x.id===subjId);if(!s)return 0;
  const tm=s.terms[t];if(!tm)return 0;
  return tm.inds.reduce((a,ind)=>{
    const sc=tm.scores[ind.id]&&tm.scores[ind.id][sid];
    return a+(sc!==undefined&&sc!==''?Number(sc):0);
  },0);
}
function getTermTot(DB,subjId,t,sid){
  const s=DB.subjects.find(x=>x.id===subjId);if(!s)return null;
  const tm=s.terms[t];if(!tm)return null;
  const fin=tm.fin[sid]!==''&&tm.fin[sid]!==undefined?Number(tm.fin[sid]):null;
  if(fin===null)return null;
  return Math.round(getCollect(DB,subjId,t,sid)+fin);
}
function getGrade(sc){
  if(sc>=80)return{g:'4',lbl:'ดีเยี่ยม'};if(sc>=75)return{g:'3.5',lbl:'ดีมาก'};
  if(sc>=70)return{g:'3',lbl:'ดี'};if(sc>=65)return{g:'2.5',lbl:'ค่อนข้างดี'};
  if(sc>=60)return{g:'2',lbl:'น่าพอใจ'};if(sc>=55)return{g:'1.5',lbl:'พอใช้'};
  if(sc>=50)return{g:'1',lbl:'ผ่านเกณฑ์'};return{g:'0',lbl:'ต่ำกว่าเกณฑ์'};
}
function getAttCnt(DB,subjId,t,sid){
  const s=DB.subjects.find(x=>x.id===subjId);if(!s)return{come:0,abs:0,late:0,leave:0,empty:0,tot:0};
  const tm=s.terms[t];if(!tm||!tm.att)return{come:0,abs:0,late:0,leave:0,empty:0,tot:0};
  const hpw=Math.min(s.hpw||1,7),wpt=s.wpterm||20;
  const rec=(tm.att.rec&&tm.att.rec[sid])||{};
  let come=0,abs=0,late=0,leave=0,empty=0;
  for(let w=1;w<=wpt;w++)for(let d=0;d<hpw;d++){
    const v=rec[`w${w}d${d}`]||'';
    if(v==='P')come++;else if(v==='A')abs++;else if(v==='L')late++;else if(v==='H')leave++;else empty++;
  }
  return{come,abs,late,leave,empty,tot:hpw*wpt};
}
function attPass(DB,subjId,t,sid){
  const cnt=getAttCnt(DB,subjId,t,sid);
  const s=DB.subjects.find(x=>x.id===subjId);if(!s)return true;
  return cnt.come>=Math.round((s.hpw||1)*(s.wpterm||20)*.8);
}
function countIndPass(DB,subjId,sid){
  const s=DB.subjects.find(x=>x.id===subjId);if(!s)return{pass:0,fail:0};
  let pass=0,fail=0;
  [1,2].forEach(t=>{
    const tm=s.terms[t];if(!tm)return;
    tm.inds.forEach(ind=>{
      const sc=tm.scores[ind.id]&&tm.scores[ind.id][sid];
      if(sc===undefined||sc==='')return;
      Number(sc)>=ind.max*.5?pass++:fail++;
    });
  });
  return{pass,fail};
}
function formatDate(d,fmt){
  const THDAYS=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const THMONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const day=d.getDate();const mo=d.getMonth();const yr=(d.getFullYear()+543)%100;const dow=THDAYS[d.getDay()];
  if(fmt==='short')return`${dow}.${day}/${mo+1}`;
  if(fmt==='thai')return`${day} ${THMONTHS[mo]}`;
  return`${dow}.${day}/${mo+1}/${yr}`;
}
function generateDates(start,dows,wpt,hpw,fmt){
  const dates=[];let cur=new Date(start);
  for(let w=0;w<wpt;w++){
    const startOfWeek=new Date(cur);startOfWeek.setDate(cur.getDate()-cur.getDay());
    dows.sort((a,b)=>a-b).forEach(dow=>{
      const d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+dow);
      dates.push(formatDate(d,fmt));
    });
    cur.setDate(cur.getDate()+7);
  }
  return dates;
}

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
const TEST_GROUPS=[

    }},

      const p='80-20'.split('-').map(Number);assertEqual(p[0]+p[1],100,'รวม 100');

    {name:'DB มีวิชาและนักเรียน',fn:()=>{

  {name:'📊 คะแนนตัวชี้วัด (Indicator Scores)',tests:[

      const sid='s2';
      tm.scores['i1']={};tm.scores['i1'][sid]='';
      const col=getCollect(DB,'subj1',1,sid);

    }},
    {name:'ตัวชี้วัดผ่าน: ≥ 50% ของคะแนนเต็ม',fn:()=>{
      const DB=makeMockDB();const s=DB.subjects[0];const tm=s.terms[1];
      const ind=tm.inds[0];// max=30, threshold=15
      assertEqual(ind.max,30,'เต็ม 30');

    {name:'นับตัวชี้วัดผ่าน/ไม่ผ่านถูกต้อง',fn:()=>{
      const DB=makeMockDB();const s=DB.subjects[0];const tm=s.terms[1];

/* ══════════════════════════════════════════════════════════
   RUN ENGINE
══════════════════════════════════════════════════════════ */
async function runAll(){
  startTime=Date.now();results=[];
  const prog=document.getElementById('prog');
  const status=document.getElementById('status');
  const resDiv=document.getElementById('results');
  resDiv.innerHTML='';
  document.getElementById('summary').style.display='none';
  prog.style.width='0%';

  const total=TEST_GROUPS.reduce((a,g)=>a+g.tests.length,0);
  let done=0;let passed=0;let failed=0;
  const groupResults=[];

  for(const group of TEST_GROUPS){
    const gRes={name:group.name,tests:[]};
    for(const t of group.tests){
      status.textContent=`กำลังทดสอบ: ${t.name}...`;
      await new Promise(r=>setTimeout(r,0));// yield to UI
      let ok=false;let err='';
      try{t.fn();ok=true;passed++;}
      catch(e){err=e.message;failed++;}
      gRes.tests.push({name:t.name,ok,err});
      done++;
      prog.style.width=`${Math.round(done/total*100)}%`;
    }
    groupResults.push(gRes);
  }

  const elapsed=((Date.now()-startTime)/1000).toFixed(2);
  prog.style.background=failed?'#8b2020':'#1a5c3f';
  status.textContent=`เสร็จสิ้น! ${passed} ผ่าน, ${failed} ล้มเหลว (${elapsed}s)`;

  // Summary cards
  document.getElementById('summary').style.display='block';
  document.getElementById('sum-cards').innerHTML=`
    <div class="sum-card"><div class="v">${total}</div><div class="l">ทดสอบทั้งหมด</div></div>
    <div class="sum-card"><div class="v" style="color:#1a5c3f">${passed}</div><div class="l">ผ่าน ✓</div></div>
    <div class="sum-card"><div class="v" style="color:${failed?'#8b2020':'#72706a'}">${failed}</div><div class="l">ล้มเหลว ✗</div></div>
    <div class="sum-card"><div class="v">${Math.round(passed/total*100)}%</div><div class="l">อัตราผ่าน</div></div>`;
  document.getElementById('dur').textContent=`ใช้เวลา: ${elapsed} วินาที`;

  // Group results
  resDiv.innerHTML='';
  groupResults.forEach(gr=>{
    const gPassed=gr.tests.filter(t=>t.ok).length;
    const gTotal=gr.tests.length;
    const allPass=gPassed===gTotal;
    const div=document.createElement('div');div.className='group';
    div.innerHTML=`<div class="group-hd">
      <h2>${gr.name}</h2>
      <span class="group-score" style="color:${allPass?'#1a5c3f':'#8b2020'}">${gPassed}/${gTotal}</span>
    </div>
    <div class="tests">
      ${gr.tests.map(t=>`
        <div class="test">
          <span class="icon ${t.ok?'pass':'fail'}">${t.ok?'✓':'✗'}</span>
          <div style="flex:1">
            <div class="test-name">${t.name}</div>
            ${t.err?`<div class="test-err">⚠ ${t.err}</div>`:''}
          </div>
          <span class="badge ${t.ok?'bp':'bf'}">${t.ok?'ผ่าน':'ล้มเหลว'}</span>
        </div>`).join('')}
    </div>`;
    resDiv.appendChild(div);
  });
}
function clearResults(){
  document.getElementById('results').innerHTML='';
  document.getElementById('summary').style.display='none';
  document.getElementById('prog').style.width='0%';
  document.getElementById('prog').style.background='#1a5c3f';
  document.getElementById('status').textContent='';
}
</script>
